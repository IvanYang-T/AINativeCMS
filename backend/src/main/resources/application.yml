server:
  port: 8082

spring:
  application:
    name: ai-native-cms
  datasource:
    url: jdbc:h2:mem:ainativecms;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.ainativecms: DEBUG
